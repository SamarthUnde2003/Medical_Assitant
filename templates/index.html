<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthCare Assistant</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="./static/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Main -->
      <div class="main">
        <div class="topbar">
          <button class="model-select">HealthCare Assistant</button>
          <div class="topbar-actions">
            <button class="icon-btn" title="More options">
              <i class="ti ti-dots"></i>
            </button>
          </div>
        </div>

        <div class="chat-area" id="chatArea">
          <div class="welcome" id="welcomeScreen">
            <h1>What can I help with?</h1>
            <p>Ask me anything — Related Health.</p>
          </div>
        </div>

        <div class="input-area">
          <div class="input-box">
            <div class="input-row">
              <textarea
                id="msgInput"
                rows="1"
                placeholder="Enter to Search"
                oninput="autoResize(this)"
              ></textarea>
              <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="ti ti-arrow-up"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let typing = false;

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 140) + "px";
      }

      function createMsgActions() {
        const div = document.createElement("div");
        div.className = "msg-actions";
        div.innerHTML = `
          <button title="Copy"><i class="ti ti-copy"></i></button>
          <button title="Thumbs up"><i class="ti ti-thumb-up"></i></button>
          <button title="Thumbs down"><i class="ti ti-thumb-down"></i></button>
          <button title="Regenerate"><i class="ti ti-refresh"></i></button>
        `;
        return div;
      }

      async function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text || typing) return;

        const chatArea = document.getElementById("chatArea");
        const welcome = document.getElementById("welcomeScreen");
        if (welcome) welcome.remove();

        // Render user message
        const userRow = document.createElement("div");
        userRow.className = "message-row user";
        userRow.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        chatArea.appendChild(userRow);

        input.value = "";
        input.style.height = "auto";
        chatArea.scrollTop = chatArea.scrollHeight;

        // Show typing indicator
        typing = true;
        document.getElementById("sendBtn").disabled = true;

        const thinkRow = document.createElement("div");
        thinkRow.className = "message-row";
        const thinkingP = document.createElement("p");
        thinkingP.style.color = "var(--text-tertiary)";
        thinkingP.textContent = "●●●";

        const assistantContent = document.createElement("div");
        assistantContent.className = "assistant-content";
        assistantContent.appendChild(thinkingP);

        thinkRow.innerHTML = `<div class="msg-avatar">H</div>`;
        thinkRow.appendChild(assistantContent);
        chatArea.appendChild(thinkRow);
        chatArea.scrollTop = chatArea.scrollHeight;

        try {
          // POST to Flask /get endpoint
          const formData = new FormData();
          formData.append("msg", text);

          const response = await fetch("/get", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
          }

          const reply = await response.text();

          // Replace typing indicator with actual reply
          thinkingP.textContent = reply;
          thinkingP.removeAttribute("style");
          assistantContent.appendChild(createMsgActions());
        } catch (err) {
          thinkingP.textContent = "Something went wrong. Please try again.";
          thinkingP.style.color = "var(--text-tertiary)";
          console.error("Fetch error:", err);
        } finally {
          typing = false;
          document.getElementById("sendBtn").disabled = false;
          chatArea.scrollTop = chatArea.scrollHeight;
        }
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function newChat() {
        const chatArea = document.getElementById("chatArea");
        chatArea.innerHTML = `
          <div class="welcome" id="welcomeScreen">
            <h1>What can I help with?</h1>
            <p>Ask me anything — I'm here to help.</p>
          </div>
        `;
      }

      document
        .getElementById("msgInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
    </script>
  </body>
</html>
